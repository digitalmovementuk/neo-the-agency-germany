<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const segmentCount = 1
      const locationUrl = window.location
      locationUrl.replace(
        locationUrl.protocol +
          '//' +
          locationUrl.hostname +
          (locationUrl.port ? ':' + locationUrl.port : '') +
          locationUrl.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
          '/?/' +
          locationUrl.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (locationUrl.search ? '&' + locationUrl.search.slice(1).replace(/&/g, '~and~') : '') +
          locationUrl.hash,
      )
    </script>
  </head>
  <body></body>
</html>
